server:
  port: 8080

spring:
  application:
    name: contest-api
  datasource:
    url: jdbc:postgresql://localhost:5432/contest
    username: contest
    password: contest_dev_pw          # DEV ONLY
  jpa:
    hibernate:
      ddl-auto: none                  # Flyway owns the schema
    open-in-view: false
  flyway:
    enabled: true
    table: flyway_history_contest     # separate history from auth-service's flyway_history_auth
    baseline-on-migrate: true
    baseline-version: 0
  data:
    redis:
      host: localhost
      port: 6379

app:
  session:
    ttl-hours: 8                      # must match auth-service so the sliding window is consistent
  submission:
    allowed-languages: [ c, cpp, java, python ]
    max-source-bytes: 65536           # 64 KB hard cap (UTF-8 bytes)
    cooldown-ms: 10000                # min gap between a user's submissions
    inflight-ttl-seconds: 120         # safety TTL on the one-in-flight lock (orchestrator clears it on verdict)
    grace-seconds: 5                  # leeway past ends_at for a buzzer-beater click
    stream-key: subq

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
