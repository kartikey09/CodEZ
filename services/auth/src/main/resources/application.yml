server:
  port: 8081                         # contest-api is 8080; auth-service is 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/contest
    username: contest
    password: contest_dev_pw         # DEV ONLY
  jpa:
    hibernate:
      ddl-auto: none                 # Flyway owns the schema
    open-in-view: false
  flyway:
    enabled: true
    table: flyway_history_auth       # separate history so contest-api's Flyway can share this DB
  data:
    redis:
      host: localhost
      port: 6379
      password: e0245a7dc1216ca16ad4d5a7abf5ecb1313cd35b   # DEV ONLY — must match contest-redis's --requirepass

app:
  cookie-secure: false               # DEV over http. MUST be true in prod (https) — see application-prod.yml
  session:
    ttl-hours: 8

management:
  endpoints:
    web:
      exposure:
        include: health,info
