spring:
  application:
    name: orchestrator
  main:
    web-application-type: none        # a worker, not a server

app:
  judge0:
    base-url: http://localhost:2358   # the Judge0 CE stack (deploy/judge0)
    auth-token: ""                    # set to the AUTHN_TOKEN from judge0.conf in prod; empty in dev
    connect-timeout-ms: 2000
    read-timeout-ms: 10000
    max-retries: 3
