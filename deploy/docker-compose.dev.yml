name: contest-dev

services:
  postgres:
    image: postgres:16
    container_name: contest-postgres
    environment:
      POSTGRES_USER: contest
      POSTGRES_PASSWORD: contest_dev_pw      # DEV ONLY — prod uses a real secret
      POSTGRES_DB: contest
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data       # named volume → survives container recreate
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contest -d contest"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: contest-redis
    # DEV ONLY password — sessions live here, so an unauthenticated Redis is a full
    # auth bypass (anyone could HSET a forged sess:{sid} with role=admin). Every
    # service's spring.data.redis.password must match this.
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "e0245a7dc1216ca16ad4d5a7abf5ecb1313cd35b"]
    ports:
      - "127.0.0.1:6379:6379"   # loopback only — every client runs on this host
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "e0245a7dc1216ca16ad4d5a7abf5ecb1313cd35b", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
