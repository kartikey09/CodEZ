# Judge0 CE configuration (dev). Change the secrets before any non-local use.

# --- Judge0 server auth: clients must send  X-Auth-Token: <AUTHN_TOKEN> ---
# Set this to a real value in prod and copy it into orchestrator's app.judge0.auth-token.
AUTHN_HEADER=X-Auth-Token
AUTHN_TOKEN=

# --- Postgres (Judge0's OWN db, not the app's) ---
POSTGRES_HOST=db
POSTGRES_PORT=5432
POSTGRES_DB=judge0
POSTGRES_USER=judge0
POSTGRES_PASSWORD=judge0_dev_pw

# --- Redis (Judge0's OWN redis, not the app's) ---
REDIS_HOST=redis
REDIS_PORT=6379
REDIS_PASSWORD=judge0_redis_dev_pw

# --- limits / behaviour (sane dev defaults; tune for the contest later) ---
MAX_CPU_TIME_LIMIT=15
MAX_WALL_TIME_LIMIT=20
MAX_MEMORY_LIMIT=512000
ENABLE_WAIT_RESULT=true
